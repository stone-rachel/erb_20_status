<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ERB RUNNERS · Team Board</title>

    <!-- ✅ SUIT(정사각/각진 느낌) + Pretendard + Poppins -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css"
    />
    <linkㄹ
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #f6f7f9;
        --card: #ffffff;
        --text: #101828;
        --sub: #667085;
        --muted: #98a2b3;
        --line: rgba(16, 24, 40, 0.08);

        --shadow: 0 10px 30px rgba(16, 24, 40, 0.08);
        --shadow2: 0 6px 18px rgba(16, 24, 40, 0.06);

        /* top3 */
        --gold: #f6c343;
        --silver: #cfd6e6;
        --bronze: #c97b4a;
        --grayBadge: #94a3b8;

        --blue: #3182f6;
        --blue2: #1d4ed8;

        --radius: 22px;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        /* ✅ 전체적으로 둔탁함 줄이기: 기본을 SUIT로 (각진/정사각), 두껍지 않게 */
        font-family:
          SUIT,
          Pretendard,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          "Apple SD Gothic Neo",
          "Noto Sans KR",
          "Malgun Gothic",
          sans-serif;
        background: var(--bg);
        color: var(--text);
        overflow-x: hidden;
      }

      /* ===== Running track background ===== */
      .bgTrack {
        position: fixed;
        inset: -140px -180px auto auto;
        width: 760px;
        height: 760px;
        opacity: 0.1;
        pointer-events: none;
        z-index: 0;
      }
      .bgTrack2 {
        position: fixed;
        inset: auto auto -220px -220px;
        width: 860px;
        height: 860px;
        opacity: 0.08;
        pointer-events: none;
        z-index: 0;
        transform: rotate(12deg);
      }

      .wrap {
        max-width: 780px;
        margin: 0 auto;
        padding: 18px 14px 32px;
        position: relative;
        z-index: 1;
      }

      header {
        padding: 10px 2px 14px;
      }

      /* ✅ 상단 전체 좌측 정렬 */
      header,
      .hero,
      .heroTop,
      .progWrap,
      .progTop,
      .dataInfo {
        text-align: left;
      }
      .heroTop {
        justify-content: flex-start;
      }
      .controls {
        margin-left: auto;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
        margin-bottom: 12px;
      }
      .logo {
        width: 38px;
        height: 38px;
        border-radius: 14px;
        background: linear-gradient(135deg, #3182f6, #a78bfa);
        box-shadow: 0 10px 18px rgba(16, 24, 40, 0.14);
        flex: 0 0 auto;
      }
      .brandText {
        min-width: 0;
      }
      .brandTitle {
        font-weight: 800; /* ✅ 1000 → 800 */
        letter-spacing: -0.1px;
        font-size: 14px;
        line-height: 1.15;
      }
      .brandSub {
        display: block;
        margin-top: 2px;
        font-size: 12px;
        color: var(--sub);
        line-height: 1.15;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 460px;
      }

      .hero {
        padding: 16px 18px 16px;
        border-radius: var(--radius);
        background: #fff;
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
      }
      .hero::before {
        content: "";
        position: absolute;
        inset: -120px -220px auto auto;
        width: 520px;
        height: 520px;
        background:
          radial-gradient(
            circle at 30% 30%,
            rgba(49, 130, 246, 0.18),
            transparent 55%
          ),
          radial-gradient(
            circle at 70% 60%,
            rgba(167, 139, 250, 0.14),
            transparent 55%
          );
        pointer-events: none;
      }

      .heroTop {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        flex-wrap: wrap;
        position: relative;
        z-index: 1;
      }

      h1 {
        margin: 0;
        font-size: 36px;
        line-height: 1.06;
        letter-spacing: -0.8px;
        font-weight: 900; /* ✅ 1000 → 900 */
      }
      .subtitle {
        margin-top: 6px;
        font-size: 13px;
        color: var(--sub);
        line-height: 1.3;
        font-weight: 600; /* ✅ 조금 더 정돈 */
      }
      .smallLine {
        margin-top: 6px;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.35;
        font-weight: 600;
      }

      /* ===== Program progress runner bar ===== */
      .progWrap {
        margin-bottom: 12px;
        position: relative;
        z-index: 1;
      }
      .progTop {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 6px;
      }
      .progTitle {
        font-size: 12px;
        font-weight: 800;
        color: var(--sub);
        letter-spacing: -0.1px;
      } /* ✅ 1000 → 800 */
      .progPct {
        font-family: SUIT, "Poppins", system-ui, sans-serif;
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
      }

      .progTrackWrap {
        position: relative;
        padding-top: 22px;
      }
      .progTrack {
        position: relative;
        height: 12px;
        border-radius: 999px;
        background: rgba(16, 24, 40, 0.06);
        border: 1px solid rgba(16, 24, 40, 0.06);
        overflow: hidden;
      }
      .progFill {
        position: absolute;
        inset: 0 auto 0 0;
        width: 0%;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          rgba(246, 195, 67, 1),
          rgba(255, 79, 216, 1),
          rgba(59, 130, 246, 1)
        );
      }
      .runner {
        position: absolute;
        top: 0;
        left: 0px;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(16, 24, 40, 0.1);
        box-shadow: 0 10px 18px rgba(16, 24, 40, 0.1);
        backdrop-filter: blur(8px);
        white-space: nowrap;
        user-select: none;
        z-index: 2;
      }
      .runnerIcon {
        font-size: 14px;
        line-height: 1;
      }
      .runnerText {
        font-family: SUIT, "Poppins", system-ui, sans-serif;
        font-size: 12px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.1px;
      }
      .progMeta {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-top: 6px;
        color: var(--muted);
        font-size: 11px;
        font-family: SUIT, "Poppins", system-ui, sans-serif;
        font-weight: 600;
      }

      /* ===== Data reflected bar under Week ===== */
      .dataInfo {
        margin-top: 10px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .dataInfoText {
        font-size: 12px;
        color: var(--sub);
        font-weight: 700;
        letter-spacing: -0.1px;
      } /* ✅ 800 → 700 */
      .dataBar {
        width: 220px;
        height: 8px;
        border-radius: 999px;
        background: rgba(16, 24, 40, 0.06);
        overflow: hidden;
        border: 1px solid rgba(16, 24, 40, 0.06);
      }
      .dataBarFill {
        height: 100%;
        width: 0%;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          rgba(246, 195, 67, 1),
          rgba(255, 79, 216, 1),
          rgba(59, 130, 246, 1)
        );
      }

      /* ===== Controls ===== */
      .controls {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .pill {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 999px;
        background: #fff;
        border: 1px solid var(--line);
        box-shadow: var(--shadow2);
      }
      .pill span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.02em;
      } /* ✅ 900 → 800 */
      input[type="text"] {
        border: none;
        outline: none;
        background: transparent;
        color: var(--text);
        width: 210px;
        font-size: 14px;
        font-weight: 700; /* ✅ 800 → 700 */
        font-family: SUIT, Pretendard, system-ui, sans-serif;
      }
      input[type="text"]::placeholder {
        color: #c0c7d2;
        font-weight: 600;
      }

      .btn {
        border: none;
        cursor: pointer;
        padding: 10px 12px;
        border-radius: 999px;
        background: rgba(49, 130, 246, 0.1);
        border: 1px solid rgba(49, 130, 246, 0.18);
        color: var(--blue2);
        font-weight: 800; /* ✅ 1000 → 800 */
        font-family: SUIT, Pretendard, system-ui, sans-serif;
        box-shadow: var(--shadow2);
      }
      .btn:hover {
        background: rgba(49, 130, 246, 0.14);
      }

      main {
        margin-top: 14px;
      }
      .sheet {
        background: transparent;
        padding: 0;
      }

      /* ===== Row Card ===== */
      .row {
        position: relative;
        background: var(--card);
        border-radius: 28px;
        border: 1px solid var(--line);
        box-shadow: var(--shadow2);
        padding: 18px 18px 26px;
        margin: 18px 0;

        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;

        overflow: visible;
      }

      .row.top1::before,
      .row.top2::before,
      .row.top3::before {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        height: 7px;
        border-radius: 28px 28px 0 0;
      }
      .row.top1::before {
        background: linear-gradient(
          90deg,
          rgba(246, 195, 67, 0.95),
          rgba(246, 195, 67, 0.1)
        );
      }
      .row.top2::before {
        background: linear-gradient(
          90deg,
          rgba(207, 214, 230, 0.95),
          rgba(207, 214, 230, 0.12)
        );
      }
      .row.top3::before {
        background: linear-gradient(
          90deg,
          rgba(201, 123, 74, 0.95),
          rgba(201, 123, 74, 0.1)
        );
      }

      .leftBlock {
        display: flex;
        gap: 14px;
        align-items: flex-start;
        min-width: 0;
      }

      .teamBlock {
        flex: 1;
        min-width: 0;
      }
      .team,
      .members {
        width: 100%;
        text-align: left;
        max-width: none;
      }

      /* =========================================================
       ✅ Medal: 다이아 문양 제거 + 참고 이미지처럼 "대각선 라인" 광택
       ========================================================= */

      .rankBadge {
        --ribA: #b6c2d6;
        --ribB: #8fa0bf;

        position: relative;
        width: 62px;
        height: 62px;
        flex: 0 0 auto;
        border-radius: 18px;
        isolation: isolate;
        display: grid;
        place-items: center;

        box-shadow:
          0 14px 22px rgba(2, 6, 23, 0.18),
          0 6px 10px rgba(2, 6, 23, 0.1);
      }
      .rankBadge.top3d {
        box-shadow:
          0 18px 28px rgba(2, 6, 23, 0.22),
          0 8px 14px rgba(2, 6, 23, 0.12);
      }

      .rankBadge::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 18px;
        transform: translateY(6px);
        z-index: -1;
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.18),
          rgba(0, 0, 0, 0.35)
        );
        filter: saturate(1.05);
      }

      /* ribbon legs */
      .rankBadge::before {
        content: "";
        position: absolute;
        left: 50%;
        bottom: -18px;
        width: 40px;
        height: 28px;
        transform: translateX(-50%);
        z-index: -2;

        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.18),
            rgba(0, 0, 0, 0.14)
          ),
          linear-gradient(180deg, var(--ribA), var(--ribB)) left/16px 100%
            no-repeat,
          linear-gradient(180deg, var(--ribA), var(--ribB)) right/16px 100%
            no-repeat;

        filter: drop-shadow(0 10px 14px rgba(2, 6, 23, 0.18));
        border-radius: 0 0 12px 12px;
        opacity: 0.98;
      }

      .rankBadge .badgeFace {
        position: absolute;
        inset: 0;
        border-radius: 18px;
        overflow: hidden;
        display: grid;
        place-items: center;
      }

      /* ✅ Embossed rim + diagonal sheen lines */
      .rankBadge .badgeFace::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 18px;
        pointer-events: none;

        /* 1) 입체 테두리 */
        box-shadow:
          inset 0 0 0 4px rgba(255, 255, 255, 0.72),
          inset 0 0 0 7px rgba(255, 255, 255, 0.18),
          inset 0 -14px 18px rgba(2, 6, 23, 0.1),
          inset 0 10px 16px rgba(255, 255, 255, 0.18);

        /* 2) 참고 이미지 느낌: 대각선 광택 라인 (다이아/칩 제거) */
        background:
        /* 굵은 대각선 하이라이트 */
          linear-gradient(
            135deg,
            rgba(255, 255, 255, 0.55) 0%,
            rgba(255, 255, 255, 0.2) 18%,
            rgba(255, 255, 255, 0) 42%,
            rgba(255, 255, 255, 0.16) 62%,
            rgba(255, 255, 255, 0) 82%
          ),
          /* 가는 대각선 라인 2~3개 */
          repeating-linear-gradient(
              135deg,
              rgba(255, 255, 255, 0.18) 0px,
              rgba(255, 255, 255, 0.18) 2px,
              rgba(255, 255, 255, 0) 14px,
              rgba(255, 255, 255, 0) 22px
            );

        opacity: 0.95;
        mix-blend-mode: screen;
      }

      /* ✅ 기존 '다이아몬드/칩' 광택 제거 */
      .rankBadge .badgeFace::after {
        content: none;
      }

      .rankBadge .badgeFace span {
        position: relative;
        z-index: 2;
        font-family:
          SUIT, "Poppins", system-ui, sans-serif; /* ✅ 숫자도 각진 느낌 */
        font-weight: 900;
        font-size: 26px;
        line-height: 1;
        letter-spacing: -0.02em;
        color: rgba(255, 255, 255, 0.96);
        text-shadow:
          0 2px 0 rgba(0, 0, 0, 0.18),
          0 10px 18px rgba(0, 0, 0, 0.18);
        transform: translateY(-1px);
      }

      /* ribbon color overlays per rank */
      .rankBadge.gold {
        --ribA: #ff4fd8;
        --ribB: #ff73e3;
      }
      .rankBadge.silver {
        --ribA: #2f7bff;
        --ribB: #56a0ff;
      }
      .rankBadge.bronze {
        --ribA: #ffb000;
        --ribB: #ff6a2a;
      }
      .rankBadge.gray {
        --ribA: #93a4c3;
        --ribB: #6f83a6;
      }

      /* badge face color themes */
      .rankBadge.gold .badgeFace {
        background: linear-gradient(
          135deg,
          #ffcc33 0%,
          #ffb000 35%,
          #ffea7a 100%
        );
      }
      .rankBadge.gold::after {
        background: linear-gradient(180deg, #e39a00, #c97f00);
      }

      .rankBadge.silver .badgeFace {
        background: linear-gradient(
          135deg,
          #c9d4e6 0%,
          #95a6c6 45%,
          #e8eef9 100%
        );
      }
      .rankBadge.silver::after {
        background: linear-gradient(180deg, #7b8cab, #64748b);
      }

      .rankBadge.bronze .badgeFace {
        background: linear-gradient(
          135deg,
          #d98a4f 0%,
          #b8612f 45%,
          #f2c19b 100%
        );
      }
      .rankBadge.bronze::after {
        background: linear-gradient(180deg, #8b4a23, #6b3416);
      }

      .rankBadge.gray .badgeFace {
        background: linear-gradient(
          135deg,
          #a7b3c7 0%,
          #7f8ea7 45%,
          #d7deea 100%
        );
      }
      .rankBadge.gray::after {
        background: linear-gradient(180deg, #667085, #475467);
      }
      .rankBadge.gray .badgeFace span {
        color: rgba(255, 255, 255, 0.92);
      }

      /* =========================================================
       ✅ Typography (둔탁함 개선)
       3) 조 이름: 자간 살짝 넓히고, 굵기 줄이기
       ========================================================= */
      .team {
        font-weight: 800; /* ✅ 1000 → 800 */
        font-size: 22px;
        letter-spacing: 0.02em; /* ✅ 살짝 넓힘 */
        line-height: 1.12;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        padding-top: 2px;
      }
      .members {
        margin-top: 10px;
        color: var(--sub);
        font-size: 14px;
        line-height: 1.45;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        letter-spacing: -0.05px; /* ✅ 너무 타이트한 느낌 완화 */
        font-weight: 600;
      }

      /* Right score block */
      .right {
        text-align: right;
        min-width: 170px;
        font-variant-numeric: tabular-nums;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        justify-content: flex-start;
        gap: 10px;
        padding-top: 2px;
      }
      .meta {
        display: flex;
        flex-direction: column;
        gap: 6px;
        align-items: flex-end;
      }
      .labels {
        font-family: SUIT, "Poppins", system-ui, sans-serif; /* ✅ 각진 느낌 */
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.16em;
        user-select: none;
        font-weight: 700; /* ✅ 700 유지(너무 얇으면 흐림) */
      }
      .numbersLine {
        font-family: SUIT, "Poppins", system-ui, sans-serif; /* ✅ 각진 느낌 */
        color: var(--sub);
        font-size: 13px;
        user-select: none;
        font-weight: 600;
        letter-spacing: 0;
        font-variant-numeric: tabular-nums;
        -webkit-font-smoothing: antialiased;
      }

      /* 1) 팀별 총점수: 조금 더 얇게 */
      .total {
        font-family:
          SUIT, "Poppins", system-ui, sans-serif; /* ✅ 2) 정사각 느낌 */
        font-size: 44px;
        font-weight: 700; /* ✅ 800 → 700 (조금만 더 얇게) */
        line-height: 1;
        color: #111827;
        letter-spacing: -0.4px; /* ✅ -0.6 → -0.4 (각진 폰트에 자연스럽게) */
        text-rendering: geometricPrecision;
        -webkit-font-smoothing: antialiased;
        margin-top: 2px;
      }
      .total.rank1 {
        color: var(--gold);
      }
      .total.rank2 {
        color: #9aa6bf;
      }
      .total.rank3 {
        color: var(--bronze);
      }

      /* Perfect sticker */
      .perfectSticker {
        position: absolute;
        top: -16px;
        right: 18px;
        z-index: 5;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid rgba(16, 24, 40, 0.12);
        box-shadow: 0 14px 22px rgba(16, 24, 40, 0.14);
        backdrop-filter: blur(10px);
        font-family: SUIT, "Poppins", Pretendard, system-ui, sans-serif;
        font-weight: 800;
        font-size: 14px;
        background-image: linear-gradient(
          90deg,
          rgba(246, 195, 67, 1) 0%,
          rgba(255, 79, 216, 1) 45%,
          rgba(59, 130, 246, 1) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      /* progress */
      .progressTrack {
        position: absolute;
        left: 18px;
        right: 18px;
        bottom: 12px;
        height: 7px;
        border-radius: 999px;
        background: rgba(16, 24, 40, 0.06);
        overflow: hidden;
      }
      .progressFill {
        height: 100%;
        width: 0%;
        background: linear-gradient(
          90deg,
          rgba(49, 130, 246, 1),
          rgba(29, 78, 216, 1)
        );
        border-radius: 999px;
      }

      .hint {
        color: var(--sub);
        font-size: 12px;
        margin: 10px 4px 0;
        line-height: 1.45;
        font-weight: 600;
      }

      details {
        margin-top: 14px;
        border-radius: var(--radius);
        background: #fff;
        border: 1px solid var(--line);
        padding: 12px 14px;
        color: var(--text);
        box-shadow: var(--shadow2);
      }
      summary {
        cursor: pointer;
        font-weight: 800;
        color: var(--text);

    <script>
      /** =========================
       *  ★ Google Sheets 연동 설정
       *  ========================= */
      // TODO: 여기에 Google Sheets ID를 입력하세요
      // 시트 URL이 https://docs.google.com/spreadsheets/d/XXXXX/edit 라면
      // XXXXX 부분이 SHEET_ID입니다
      const SHEET_ID = "11GMO9pGnq-mGonfBOjhzbi1FttAAC86OIgbsgUqlKoc";

      // 시트 이름 (탭 이름, 기본값은 첫 번째 시트)
      const SHEET_NAME = "집계"; // 비워두면 첫 번째 시트 사용

      /** =========================
       *  0) 데이터 반영(총 20주 중 4주 반영)
       *  ========================= */
      const TOTAL_WEEKS = 20;
      const DATA_UP_TO_WEEK = 17;

      /** =========================
       *  1) 점수 만점 기준(필요 시 수정)
       *  ========================= */
      const SCORE_MAX = { R: 490, Z: 10, E: 5 };
      const TOTAL_MAX = SCORE_MAX.R + SCORE_MAX.Z + SCORE_MAX.E;

      /** =========================
       *  2) 전체 성경읽기 기간(고정)
       *  ========================= */
      const PROGRAM_START = "2025-12-14"; // 일요일
      const PROGRAM_END = "2026-05-02"; // 토요일

      function toKSTDateOnly(yyyy_mm_dd) {
        const [y, m, d] = yyyy_mm_dd.split("-").map(Number);
        return new Date(y, m - 1, d);
      }
      function fmtKR(d) {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${y}.${m}.${day}`;
      }
      function clamp(n, min, max) {
        return Math.max(min, Math.min(max, n));
      }

      function getProgramWeekInfo(today = new Date()) {
        const start = toKSTDateOnly(PROGRAM_START);
        const end = toKSTDateOnly(PROGRAM_END);
        const t = new Date(
          today.getFullYear(),
          today.getMonth(),
          today.getDate()
        );

        if (t < start)
          return { status: "before", week: 0, weekStart: null, weekEnd: null };
        if (t > end)
          return { status: "after", week: 0, weekStart: null, weekEnd: null };

        const diffDays = Math.floor((t - start) / (1000 * 60 * 60 * 24));
        const week = Math.floor(diffDays / 7) + 1;

        const weekStart = new Date(start);
        weekStart.setDate(start.getDate() + (week - 1) * 7);

        const weekEnd = new Date(weekStart);
        weekEnd.setDate(weekStart.getDate() + 6);

        return { status: "in", week, weekStart, weekEnd };
      }

      function updateProgramProgress(today = new Date()) {
        const start = toKSTDateOnly(PROGRAM_START);
        const end = toKSTDateOnly(PROGRAM_END);
        const t = new Date(
          today.getFullYear(),
          today.getMonth(),
          today.getDate()
        );

        const total = end - start;
        const done = t - start;

        let pct = 0;
        if (total > 0) pct = (done / total) * 100;
        pct = clamp(pct, 0, 100);

        const progFill = document.getElementById("progFill");
        const runner = document.getElementById("runner");
        const progPct = document.getElementById("progPct");
        const runnerText = document.getElementById("runnerText");
        const progStart = document.getElementById("progStart");
        const progEnd = document.getElementById("progEnd");
        const track = document.getElementById("progTrack");

        progStart.textContent = fmtKR(start);
        progEnd.textContent = fmtKR(end);

        progFill.style.width = `${pct.toFixed(1)}%`;

        const w = track.getBoundingClientRect().width;
        const x = (pct / 100) * w;
        const pad = 22;
        const clampedX = Math.max(pad, Math.min(w - pad, x));
        runner.style.left = `${clampedX}px`;

        const label = t < start ? "시작 전" : t > end ? "완료!" : "오늘";
        runnerText.textContent = label;

        progPct.textContent = `${pct.toFixed(1)}%`;
      }

      /** =========================
       *  3) 데이터
       *  ========================= */
      const DEFAULT_DATA = [
        {
          team: "꾸준히매일읽(1)조",
          members: ["구재연", "양송빈", "신은섭", "김자연", "신찬희"],
          R: 196,
          Z: 10,
          E: 0,
        },
        {
          team: "JOY",
          members: ["송솔내", "김초원", "송미소", "김예지", "이지원"],
          R: 178,
          Z: 10,
          E: 0,
        },
        {
          team: "완독하조",
          members: ["임다희", "황은정", "엄주용", "이수현", "류연우"],
          R: 196,
          Z: 10,
          E: 0,
        },
        {
          team: "오늘도읽조",
          members: ["최희선", "김지민", "김유리", "박다영", "이예찬"],
          R: 147,
          Z: 10,
          E: 0,
        },
        {
          team: "5늘도완독",
          members: ["윤현석", "Regan", "채희란", "채지혜", "조은서"],
          R: 181,
          Z: 0,
          E: 0,
        },
        {
          team: "킴스앤황",
          members: ["김순화", "Ji-Ho Kim", "황보라", "김지민", "김나경"],
          R: 193,
          Z: 10,
          E: 0,
        },
        {
          team: "7조",
          members: ["최지은", "황현주", "황진경", "유정", "전하운"],
          R: 186,
          Z: 0,
          E: 0,
        },
        {
          team: "팔아프니까필사하지말고꼬박꼬박읽조",
          members: ["이도연", "박도현", "장윤수", "김환근", "성명규"],
          R: 154,
          Z: 10,
          E: 0,
        },
        {
          team: "잘읽9싶조",
          members: ["조경윤", "류비취", "김예은", "김지윤", "김윤화"],
          R: 190,
          Z: 10,
          E: 0,
        },
        {
          team: "TT(Team Ten)",
          members: ["박주현", "서수연", "최민수", "이재진", "최강"],
          R: 171,
          Z: 0,
          E: 0,
        },
        {
          team: "KTVM",
          members: ["Liliana", "Yami", "양시은", "김희정"],
          R: 138,
          Z: 10,
          E: 0,
        },
        {
          team: "열십이조",
          members: ["김용빈", "고채은", "이혜진", "송준미", "정수연"],
          R: 196,
          Z: 10,
          E: 0,
        },
        {
          team: "K5",
          members: ["김하은", "김지담", "이경은", "고은빈", "김은서"],
          R: 196,
          Z: 10,
          E: 0,
        },
      ];

      let state = structuredClone(DEFAULT_DATA);

      function normalize(s) {
        return (s ?? "").toString().trim().toLowerCase();
      }
      function calcTotal(t) {
        return (Number(t.R) || 0) + (Number(t.Z) || 0) + (Number(t.E) || 0);
      }
      function isPerfect(t) {
        return calcTotal(t) === TOTAL_MAX;
      }

      function applyRanking(sorted) {
        let rank = 0;
        let prevScore = null;
        return sorted.map((t) => {
          const score = calcTotal(t);
          if (prevScore === null || score !== prevScore) rank += 1;
          prevScore = score;
          return { ...t, rank, total: score };
        });
      }

      function medalClass(rank) {
        if (rank === 1) return "gold";
        if (rank === 2) return "silver";
        if (rank === 3) return "bronze";
        return "gray";
      }
      function totalRankClass(rank) {
        if (rank === 1) return "rank1";
        if (rank === 2) return "rank2";
        if (rank === 3) return "rank3";
        return "";
      }

      function escapeHtml(str) {
        return (str ?? "")
          .toString()
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function updateHeaderWeek() {
        const info = getProgramWeekInfo(new Date());
        const titleEl = document.getElementById("weekTitle");
        const subEl = document.getElementById("subtitle");
        const rangeEl = document.getElementById("rangeLine");
        const dataText = document.getElementById("dataRefText");
        const dataBar = document.getElementById("dataRefBar");

        updateProgramProgress(new Date());

        rangeEl.textContent = `기간: ${PROGRAM_START.replaceAll("-", ".")} ~ ${PROGRAM_END.replaceAll("-", ".")} · 만점 ${TOTAL_MAX}점 (R ${SCORE_MAX.R} / Z ${SCORE_MAX.Z} / E ${SCORE_MAX.E})`;

        dataText.textContent = `데이터 반영: 총 ${TOTAL_WEEKS}주 중 Week ${DATA_UP_TO_WEEK}까지`;
        const pct = clamp((DATA_UP_TO_WEEK / TOTAL_WEEKS) * 100, 0, 100);
        dataBar.style.width = `${pct.toFixed(0)}%`;

        if (info.status === "before") {
          titleEl.textContent = "Week 0";
          subEl.textContent = `전체 성경읽기 · 시작 전`;
          return;
        }
        if (info.status === "after") {
          titleEl.textContent = "Completed";
          subEl.textContent = `전체 성경읽기 · 종료`;
          return;
        }
        titleEl.textContent = `Week ${info.week}`;
        subEl.textContent = `전체 성경읽기 · ${info.week}주차 (${fmtKR(info.weekStart)} ~ ${fmtKR(info.weekEnd)})`;
      }

      function render() {
        updateHeaderWeek();

        const q = normalize(document.getElementById("q").value);
        const filtered = state.filter((t) => {
          if (!q) return true;
          const hay = normalize(t.team) + " " + normalize(t.members.join(" "));
          return hay.includes(q);
        });

        const sorted = [...filtered].sort((a, b) => {
          const ta = calcTotal(a),
            tb = calcTotal(b);
          if (tb !== ta) return tb - ta;
          return a.team.localeCompare(b.team, "ko");
        });

        const ranked = applyRanking(sorted);

        const board = document.getElementById("board");
        board.innerHTML =
          ranked
            .map((t) => {
              const perfect = isPerfect(t);
              const pct = TOTAL_MAX
                ? clamp((t.total / TOTAL_MAX) * 100, 0, 100)
                : 0;
              const topClass =
                t.rank === 1
                  ? "top1"
                  : t.rank === 2
                    ? "top2"
                    : t.rank === 3
                      ? "top3"
                      : "";
              const isTop3 = t.rank <= 3;

              return `
      <div class="row ${topClass}">
        ${perfect ? `<div class="perfectSticker">Perfect</div>` : ``}

        <div class="leftBlock">
          <div class="rankBadge ${medalClass(t.rank)} ${isTop3 ? "top3d" : ""}">
            <div class="badgeFace"><span>${t.rank}</span></div>
          </div>

          <div class="teamBlock">
            <div class="team">${escapeHtml(t.team)}</div>
            <div class="members">${escapeHtml(t.members.join(", "))}</div>
          </div>
        </div>

        <div class="right">
          <div class="meta">
            <div class="labels">R&nbsp;&nbsp;Z&nbsp;&nbsp;E</div>
            <div class="numbersLine">${Number(t.R) || 0}&nbsp;&nbsp;${Number(t.Z) || 0}&nbsp;&nbsp;${Number(t.E) || 0}</div>
          </div>
          <div class="total ${totalRankClass(t.rank)}">${t.total}</div>
        </div>

        <div class="progressTrack">
          <div class="progressFill" style="width:${pct.toFixed(1)}%"></div>
        </div>
      </div>
    `;
            })
            .join("") ||
          `<div style="padding:14px; color:#667085; font-family:SUIT, Pretendard, system-ui, sans-serif;">검색 결과가 없습니다.</div>`;
      }

      function encodeStateToUrl() {
        const payload = state.map((t) => ({
          team: t.team,
          members: t.members,
          R: Number(t.R) || 0,
          Z: Number(t.Z) || 0,
          E: Number(t.E) || 0,
        }));
        const json = JSON.stringify(payload);
        const b64 = btoa(unescape(encodeURIComponent(json)));
        const url = new URL(location.href);
        url.searchParams.set("data", b64);
        return url.toString();
      }

      function decodeStateFromUrl() {
        const url = new URL(location.href);
        const b64 = url.searchParams.get("data");
        if (!b64) return false;
        try {
          const json = decodeURIComponent(escape(atob(b64)));
          const arr = JSON.parse(json);
          if (!Array.isArray(arr)) return false;
          state = arr.map((x) => ({
            team: x.team ?? "",
            members: Array.isArray(x.members) ? x.members : [],
            R: Number(x.R) || 0,
            Z: Number(x.Z) || 0,
            E: Number(x.E) || 0,
          }));
          return true;
        } catch (e) {
          console.warn("Failed to load data from URL:", e);
          return false;
        }
      }

      function parseCsv(text) {
        const lines = text
          .split(/\r?\n/)
          .map((l) => l.trim())
          .filter(Boolean);
        if (lines.length < 2) return null;

        const header = lines[0].split(",").map((h) => h.trim());
        const idx = {
          team: header.findIndex((h) => normalize(h) === "team"),
          members: header.findIndex((h) => normalize(h) === "members"),
          R: header.findIndex((h) => normalize(h) === "r"),
          Z: header.findIndex((h) => normalize(h) === "z"),
          E: header.findIndex((h) => normalize(h) === "e"),
        };
        if (idx.team < 0) return null;

        const out = [];
        for (let i = 1; i < lines.length; i++) {
          const cols = lines[i].split(",");
          const team = (cols[idx.team] ?? "").trim();
          if (!team) continue;

          const membersRaw = (
            idx.members >= 0 ? (cols[idx.members] ?? "") : ""
          ).trim();
          const members = membersRaw
            ? membersRaw
                .split("|")
                .map((s) => s.trim())
                .filter(Boolean)
            : [];

          out.push({
            team,
            members,
            R: Number(cols[idx.R] ?? 0) || 0,
            Z: Number(cols[idx.Z] ?? 0) || 0,
            E: Number(cols[idx.E] ?? 0) || 0,
          });
        }
        return out;
      }

      document.getElementById("q").addEventListener("input", render);

      document
        .getElementById("copyLink")
        .addEventListener("click", async () => {
          try {
            const link = encodeStateToUrl();
            await navigator.clipboard.writeText(link);
            alert("현재 데이터가 포함된 링크를 복사했습니다.");
          } catch (e) {
            alert("복사에 실패했습니다. (브라우저 권한을 확인해 주세요)");
          }
        });

      document.getElementById("loadCsv").addEventListener("click", () => {
        const text = document.getElementById("csv").value;
        const parsed = parseCsv(text);
        if (!parsed) {
          alert(
            "CSV 형식을 확인해 주세요. (헤더 포함: team,members,R,Z,E / members는 | 로 구분)"
          );
          return;
        }
        state = parsed;
        render();
      });

      document.getElementById("resetData").addEventListener("click", () => {
        state = structuredClone(DEFAULT_DATA);
        const url = new URL(location.href);
        url.searchParams.delete("data");
        history.replaceState({}, "", url.toString());
        render();
      });

      window.addEventListener("resize", () => updateHeaderWeek());

      /** =========================
       *  Google Sheets 데이터 로드
       *  ========================= */
      async function loadFromGoogleSheets() {
        if (!SHEET_ID || SHEET_ID === "YOUR_SHEET_ID_HERE") {
          console.log("Google Sheets ID가 설정되지 않음. 기본 데이터 사용.");
          return false;
        }

        try {
          // 로딩 상태 표시
          const board = document.getElementById("board");
          board.innerHTML = `<div style="padding:24px; color:#667085; font-family:SUIT, Pretendard, system-ui, sans-serif; text-align:center;">
            <div style="font-size:24px; margin-bottom:8px;">⏳</div>
            데이터를 불러오는 중...
          </div>`;

          const sheetParam = SHEET_NAME
            ? `&sheet=${encodeURIComponent(SHEET_NAME)}`
            : "";
          const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json${sheetParam}`;

          const response = await fetch(url);
          const text = await response.text();

          // Google의 응답은 "google.visualization.Query.setResponse({...})" 형태
          // JSON 부분만 추출
          const jsonMatch = text.match(
            /google\.visualization\.Query\.setResponse\(([\s\S]+)\);?$/
          );
          if (!jsonMatch) {
            throw new Error("Google Sheets 응답 파싱 실패");
          }

          const data = JSON.parse(jsonMatch[1]);
          const rows = data.table.rows;
          const cols = data.table.cols;

          // 헤더 인덱스 찾기 (한글 컬럼명 지원)
          const headerMap = {};
          const findHeader = (label) => {
            const l = label.toLowerCase().trim();
            if (l === "팀명" || l === "team") return "team";
            if (l === "팀원명" || l === "members") return "members";
            if (l.includes("읽기") || l === "r") return "R";
            if (l.includes("줌") || l === "z") return "Z";
            if (l.includes("이벤트") || l === "e") return "E";
            return null;
          };

          cols.forEach((col, idx) => {
            const key = findHeader(col.label || "");
            // 먼저 매칭된 컬럼 우선 (중복 방지: "줌" vs "1차 줌미팅")
            if (key && headerMap[key] === undefined) headerMap[key] = idx;
          });

          // 첫 번째 행이 상위 헤더인 경우 스킵 (예: "3주차 집계" 등)
          // 실제 헤더를 찾을 때까지 스킵
          while (headerMap.team === undefined && rows.length > 0) {
            const currentRow = rows[0].c;
            const tempMap = {};

            currentRow.forEach((cell, idx) => {
              const val = (cell?.v || "").toString();
              const key = findHeader(val);
              if (key) tempMap[key] = idx;
            });

            // "팀명" 컬럼을 찾았으면 이 행이 헤더
            if (tempMap.team !== undefined) {
              Object.assign(headerMap, tempMap);
              rows.shift(); // 헤더 행 제거
              break;
            }

            // 아니면 상위 헤더로 간주하고 스킵
            rows.shift();
          }

          if (headerMap.team === undefined) {
            throw new Error("'팀명' 컬럼을 찾을 수 없습니다");
          }

          // 데이터 파싱
          const parsed = [];
          for (const row of rows) {
            const cells = row.c;
            const team = (cells[headerMap.team]?.v || "").toString().trim();
            if (!team) continue;

            const membersRaw =
              headerMap.members !== undefined
                ? (cells[headerMap.members]?.v || "").toString().trim()
                : "";
            const members = membersRaw
              ? membersRaw
                  .split(",")
                  .map((s) => s.trim())
                  .filter(Boolean)
              : [];

            parsed.push({
              team,
              members,
              R: Number(cells[headerMap.R]?.v) || 0,
              Z: Number(cells[headerMap.Z]?.v) || 0,
              E: Number(cells[headerMap.E]?.v) || 0,
            });
          }

          if (parsed.length === 0) {
            throw new Error("유효한 데이터가 없습니다");
          }

          state = parsed;
          console.log(
            `Google Sheets에서 ${parsed.length}개 팀 데이터 로드 완료`
          );
          return true;
        } catch (error) {
          console.error("Google Sheets 로드 실패:", error);
          alert(
            `Google Sheets 로드 실패: ${error.message}\n기본 데이터를 사용합니다.`
          );
          return false;
        }
      }

      // 초기화
      async function init() {
        // URL 파라미터에 데이터가 있으면 우선 사용
        const hasUrlData = decodeStateFromUrl();

        // URL 데이터가 없으면 Google Sheets에서 로드
        if (!hasUrlData) {
          await loadFromGoogleSheets();
        }

        render();
      }

      init();
    </script>
  </body>
</html>
